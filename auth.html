<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CVForge — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#090B0F;--s1:#131720;--s2:#181D28;--s3:#1E2433;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.11);
  --t0:#F0F2F8;--t1:#B8BECC;--t2:#7A8299;--t3:#4A5166;
  --blue:#4F7AFF;--blue2:#6B93FF;--blue3:#3A62E8;--bd:rgba(79,122,255,.15);--bg_blue:rgba(79,122,255,.08);
  --green:#22C55E;--gd:rgba(34,197,94,.12);
  --red:#EF4444;--rd:rgba(239,68,68,.12);
  --amber:#F59E0B;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--t0);font-size:14px;line-height:1.5}

/* ── PAGE LAYOUT ── */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* ── BRAND ── */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.brand-logo{width:38px;height:38px;border-radius:var(--r12);background:linear-gradient(135deg,#3A62E8,#6B93FF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;box-shadow:0 0 0 1px rgba(79,122,255,.4),0 4px 16px rgba(79,122,255,.35)}
.brand-name{font-size:20px;font-weight:800;color:var(--t0);letter-spacing:-.3px}

/* ── CARD ── */
.card{width:100%;max-width:420px;background:var(--s1);border:1.5px solid var(--b1);border-radius:var(--r16);padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.card-title{font-size:20px;font-weight:800;color:var(--t0);margin-bottom:4px;letter-spacing:-.3px}
.card-sub{font-size:13px;color:var(--t2);margin-bottom:24px}

/* ── TAB SWITCHER ── */
.tab-row{display:flex;background:var(--s2);border-radius:var(--r8);padding:3px;margin-bottom:24px;gap:3px}
.tab-btn{flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;background:transparent;color:var(--t2)}
.tab-btn.active{background:var(--s3);color:var(--t0);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);margin-bottom:5px}
input{width:100%;padding:10px 12px;background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r8);color:var(--t0);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
input:hover{border-color:var(--b2);background:var(--s3)}
input:focus{border-color:var(--blue);background:var(--s3);box-shadow:0 0 0 3px rgba(79,122,255,.12)}
input::placeholder{color:var(--t3)}
input.err{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04)}

/* ── ROLE SELECTOR ── */
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.role-opt{padding:10px;border:1.5px solid var(--b1);border-radius:var(--r8);cursor:pointer;transition:all .15s;text-align:center;background:var(--s2)}
.role-opt:hover{border-color:var(--b2);background:var(--s3)}
.role-opt.sel{border-color:var(--blue);background:var(--bg_blue)}
.role-opt .ri{font-size:20px;display:block;margin-bottom:4px}
.role-opt .rl{font-size:11px;font-weight:700;color:var(--t1)}
.role-opt.sel .rl{color:var(--blue2)}
.role-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);margin-bottom:7px}

/* ── BUTTONS ── */
.btn-submit{
  width:100%;padding:12px;border:none;border-radius:var(--r8);
  background:linear-gradient(135deg,#3A62E8,#5B87FF);
  color:#fff;font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .18s;margin-top:8px;
  box-shadow:0 4px 16px rgba(79,122,255,.35);letter-spacing:.1px;
}
.btn-submit:hover{background:linear-gradient(135deg,#4B73F9,#6B97FF);box-shadow:0 6px 24px rgba(79,122,255,.5);transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── MESSAGES ── */
.msg{padding:10px 13px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-bottom:14px;display:none;line-height:1.5}
.msg.err{background:var(--rd);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.msg.ok{background:var(--gd);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.msg.show{display:block}

/* ── FOOTER LINK ── */
.card-foot{text-align:center;margin-top:18px;font-size:12px;color:var(--t2)}
.card-foot a{color:var(--blue2);text-decoration:none;font-weight:600}
.card-foot a:hover{color:var(--blue)}

/* ── PASSWORD STRENGTH ── */
.pw-strength{height:3px;border-radius:2px;margin-top:5px;background:var(--b1);overflow:hidden}
.pw-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.pw-hint{font-size:10px;color:var(--t3);margin-top:3px}

/* ── SPINNER ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.or{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--t3);font-size:11px;font-weight:600}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--b1)}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-logo">CV</div>
    <span class="brand-name">CVForge</span>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
      <button class="tab-btn"        onclick="showTab('register')">Create Account</button>
    </div>

    <!-- ── ERROR / SUCCESS MESSAGE ── -->
    <div class="msg" id="msg"></div>

    <!-- ══════════ LOGIN FORM ══════════ -->
    <div id="form-login">
      <div class="fg">
        <label class="fl">Email</label>
        <input id="l-email" type="email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <input id="l-password" type="password" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">Sign In</button>
      <div class="card-foot">
        No account? <a href="#" onclick="showTab('register')">Create one free</a>
      </div>
    </div>

    <!-- ══════════ REGISTER FORM ══════════ -->
    <div id="form-register" style="display:none">
      <div class="fg">
        <label class="fl">Full Name</label>
        <input id="r-name" type="text" placeholder="Ahmed Ali" autocomplete="name"/>
      </div>
      <div class="fg">
        <label class="fl">Email</label>
        <input id="r-email" type="email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <input id="r-password" type="password" placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password" oninput="checkPwStrength(this.value)"/>
        <div class="pw-strength"><div class="pw-fill" id="pw-fill"></div></div>
        <div class="pw-hint" id="pw-hint">Enter a password</div>
      </div>

      <div class="role-label">I am a…</div>
      <div class="role-row">
        <div class="role-opt sel" id="role-candidate" onclick="selectRole('candidate')">
          <span class="ri">👤</span><span class="rl">Job Seeker</span>
        </div>
        <div class="role-opt" id="role-recruiter" onclick="selectRole('recruiter')">
          <span class="ri">🔍</span><span class="rl">Recruiter</span>
        </div>
      </div>

      <button class="btn-submit" id="btn-register" onclick="doRegister()">Create Account</button>
      <div class="card-foot">
        Already have an account? <a href="#" onclick="showTab('login')">Sign in</a>
      </div>
    </div>

  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const API = 'http://localhost:3000/api';  // change to your EC2 IP in production

// ── REDIRECT IF ALREADY LOGGED IN ────────────────────────────────
(function(){
  const token = localStorage.getItem('cvforge_token');
  if(token){
    const dest = new URLSearchParams(window.location.search).get('redirect') || 'recruiter.html';
    window.location.href = dest;
  }
})();

// ── SELECTED ROLE ─────────────────────────────────────────────────
let selectedRole = 'candidate';

function selectRole(role){
  selectedRole = role;
  document.getElementById('role-candidate').classList.toggle('sel', role === 'candidate');
  document.getElementById('role-recruiter').classList.toggle('sel', role === 'recruiter');
}

// ── TAB SWITCHER ──────────────────────────────────────────────────
function showTab(tab){
  document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=> b.classList.toggle('active', (i===0) === (tab==='login')));
  clearMsg();
}

// ── MESSAGE HELPER ────────────────────────────────────────────────
function showMsg(text, type='err'){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className   = `msg ${type} show`;
}
function clearMsg(){
  const el = document.getElementById('msg');
  el.className = 'msg';
}

// ── PASSWORD STRENGTH ─────────────────────────────────────────────
function checkPwStrength(pw){
  const fill = document.getElementById('pw-fill');
  const hint = document.getElementById('pw-hint');
  let score = 0;
  if(pw.length >= 8)              score++;
  if(/[A-Z]/.test(pw))           score++;
  if(/[0-9]/.test(pw))           score++;
  if(/[^A-Za-z0-9]/.test(pw))   score++;
  if(pw.length >= 12)            score++;

  const levels = [
    {w:'0%',   bg:'transparent', label:''},
    {w:'25%',  bg:'var(--red)',   label:'Weak'},
    {w:'50%',  bg:'var(--amber)', label:'Fair'},
    {w:'75%',  bg:'var(--amber)', label:'Good'},
    {w:'90%',  bg:'var(--green)', label:'Strong'},
    {w:'100%', bg:'var(--green)', label:'Very strong'},
  ];
  const lvl = levels[Math.min(score, 5)];
  fill.style.width      = lvl.w;
  fill.style.background = lvl.bg;
  hint.textContent      = lvl.label;
}

// ── ENTER KEY SUPPORT ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  if(document.getElementById('form-login').style.display !== 'none') doLogin();
  else doRegister();
});

// ── LOGIN ─────────────────────────────────────────────────────────
async function doLogin(){
  clearMsg();
  const email    = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;
  const btn      = document.getElementById('btn-login');

  if(!email || !password){
    return showMsg('Please enter your email and password.');
  }

  btn.disabled   = true;
  btn.innerHTML  = '<span class="spinner"></span>Signing in…';

  try{
    const res  = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({email, password})
    });
    const data = await res.json();

    if(!data.success){
      showMsg(data.error || 'Login failed.');
      return;
    }

    // Store token and user info
    localStorage.setItem('cvforge_token', data.token);
    localStorage.setItem('cvforge_user',  JSON.stringify(data.user));

    showMsg('Signed in! Redirecting…', 'ok');

    // Redirect based on role
    setTimeout(() => {
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      if(redirect) window.location.href = redirect;
      else window.location.href = data.user.role === 'recruiter' ? 'recruiter.html' : 'index.html';
    }, 800);

  } catch(err){
    showMsg('Could not connect to server. Is the API running?');
  } finally{
    btn.disabled  = false;
    btn.innerHTML = 'Sign In';
  }
}

// ── REGISTER ──────────────────────────────────────────────────────
async function doRegister(){
  clearMsg();
  const fullName = document.getElementById('r-name').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-password').value;
  const btn      = document.getElementById('btn-register');

  if(!fullName || !email || !password){
    return showMsg('Please fill in all fields.');
  }
  if(password.length < 8){
    return showMsg('Password must be at least 8 characters.');
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';

  try{
    const res  = await fetch(`${API}/auth/register`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({email, password, fullName, role: selectedRole})
    });
    const data = await res.json();

    if(!data.success){
      const err = data.errors ? data.errors.join(' ') : (data.error || 'Registration failed.');
      showMsg(err);
      return;
    }

    // Store token
    localStorage.setItem('cvforge_token', data.token);
    localStorage.setItem('cvforge_user',  JSON.stringify(data.user));

    showMsg(`Welcome, ${data.user.full_name}! Redirecting…`, 'ok');

    setTimeout(() => {
      window.location.href = data.user.role === 'recruiter' ? 'recruiter.html' : 'index.html';
    }, 900);

  } catch(err){
    showMsg('Could not connect to server. Is the API running?');
  } finally{
    btn.disabled  = false;
    btn.innerHTML = 'Create Account';
  }
}
</script>
</body>
</html>
